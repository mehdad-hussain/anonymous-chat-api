services:
  - type: web
    name: anonymous-chat-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile; pnpm build; pnpm migrate
    startCommand: cd /opt/render/project && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false   # Set manually in Render dashboard
      - key: SESSION_TTL_SECONDS
        value: 86400
